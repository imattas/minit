name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Verify source
        run: |
          cargo fmt --check
          cargo test
      - name: Package release artifacts
        shell: pwsh
        run: |
          ./tools/package-release.ps1 `
            -OutputDir tools/release/artifacts `
            -Target x86_64-unknown-linux-musl `
            -Configuration release
      - name: Attest release archive
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            tools/release/artifacts/*.zip
            tools/release/artifacts/*SHA256SUMS
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="docs/releases/$GITHUB_REF_NAME.md"
          release_args=(
            "$GITHUB_REF_NAME"
            tools/release/artifacts/*.zip
            tools/release/artifacts/*SHA256SUMS
            --repo "$GITHUB_REPOSITORY"
            --title "$GITHUB_REF_NAME"
          )
          if [[ "$GITHUB_REF_NAME" == *experimental* ]]; then
            release_args+=(--prerelease)
          fi
          if [[ -f "$notes_file" ]]; then
            release_args+=(--notes-file "$notes_file")
          else
            release_args+=(--generate-notes)
          fi
          gh release create "${release_args[@]}"
